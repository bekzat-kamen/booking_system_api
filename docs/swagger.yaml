host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Server for Ticket Booking System
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Ticket Booking System API
  version: "1.0"
paths:
  /admin/bookings:
    get:
      description: '[RU] Возвращает список всех бронирований в системе с фильтрацией.
        / [EN] Returns a list of all bookings in the system with filtering.'
      parameters:
      - description: '[RU] Страница / [EN] Page'
        in: query
        name: page
        type: integer
      - description: '[RU] Лимит / [EN] Limit'
        in: query
        name: limit
        type: integer
      - description: '[RU] Статус / [EN] Status'
        in: query
        name: status
        type: string
      - description: '[RU] ID пользователя / [EN] User ID'
        in: query
        name: user_id
        type: string
      - description: '[RU] ID мероприятия / [EN] Event ID'
        in: query
        name: event_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Список всех бронирований / [EN] All bookings list'
      tags:
      - admin-bookings
  /admin/bookings/{id}:
    get:
      description: '[RU] Возвращает полную информацию о бронировании, включая данные
        пользователя и билеты. / [EN] Returns full booking info, including user data
        and tickets.'
      parameters:
      - description: '[RU] ID бронирования / [EN] Booking ID'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_bekzat-kamen_booking_system_api_internal_model.BookingDetail'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Детали бронирования / [EN] Booking details'
      tags:
      - admin-bookings
  /admin/bookings/{id}/cancel:
    post:
      description: '[RU] Принудительная отмена бронирования администратором. / [EN]
        Forced booking cancellation by admin.'
      parameters:
      - description: '[RU] ID бронирования / [EN] Booking ID'
        in: path
        name: id
        required: true
        type: string
      - description: '[RU] Вернуть средства? / [EN] Refund money?'
        in: query
        name: refund
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Отменить бронирование (админ) / [EN] Cancel booking (admin)'
      tags:
      - admin-bookings
  /admin/bookings/{id}/refund:
    post:
      description: '[RU] Инициирует процесс возврата средств за бронирование. / [EN]
        Initiates the booking refund process.'
      parameters:
      - description: '[RU] ID бронирования / [EN] Booking ID'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Оформить возврат / [EN] Process refund'
      tags:
      - admin-bookings
  /admin/bookings/export:
    get:
      description: '[RU] Выгружает список бронирований в формате CSV. / [EN] Exports
        the booking list in CSV format.'
      parameters:
      - description: '[RU] Фильтр по статусу / [EN] Status filter'
        in: query
        name: status
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
      security:
      - BearerAuth: []
      summary: '[RU] Экспорт бронирований / [EN] Export bookings'
      tags:
      - admin-bookings
  /admin/bookings/stats:
    get:
      description: '[RU] Общая статистика по всем бронированиям в системе. / [EN]
        General statistics for all bookings in the system.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_bekzat-kamen_booking_system_api_internal_model.BookingsStats'
      security:
      - BearerAuth: []
      summary: '[RU] Статистика бронирований / [EN] Bookings statistics'
      tags:
      - admin-bookings
  /admin/dashboard:
    get:
      description: '[RU] Возвращает агрегированную статистику для панели администратора.
        / [EN] Returns aggregated statistics for the admin dashboard.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_bekzat-kamen_booking_system_api_internal_model.DashboardStats'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Статистика дашборда / [EN] Dashboard statistics'
      tags:
      - admin
  /admin/events:
    get:
      description: '[RU] Расширенный список мероприятий с фильтрацией по статусу и
        организатору. / [EN] Extended events list with status and organizer filtering.'
      parameters:
      - description: '[RU] Страница / [EN] Page'
        in: query
        name: page
        type: integer
      - description: '[RU] Лимит / [EN] Limit'
        in: query
        name: limit
        type: integer
      - description: '[RU] Статус / [EN] Status'
        in: query
        name: status
        type: string
      - description: '[RU] ID организатора / [EN] Organizer ID'
        in: query
        name: organizer_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: '[RU] Список всех мероприятий (админ) / [EN] All events list (admin)'
